<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>%VITE_SITE_TITLE%</title>

    <meta name="description" content="%VITE_SITE_DESCRIPTION%" />

    <link rel="canonical" href="%VITE_SITE_DOMAIN%/" />

    <meta name="theme-color" content="%VITE_THEME_COLOR%" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_DOMAIN%/" />
    <meta property="og:site_name" content="%VITE_CLIENT_NAME%" />
    <meta property="og:title" content="%VITE_SITE_TITLE%" />
    <meta property="og:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_SITE_OG_IMAGE%" />
    <meta property="og:image:alt" content="%VITE_SITE_IMAGE_ALT%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
    <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_SITE_OG_IMAGE%" />

    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("site-theme");

          if (!savedTheme) return;

          const theme = JSON.parse(savedTheme);

          if (!theme?.colors) return;

          const colors = theme.colors;

          const style = document.createElement("style");

          style.innerHTML = `
        :root {
          --color-background: ${colors.background};
          --color-surface: ${colors.surface};
          --color-surface-muted: ${colors.surfaceMuted};
          --color-text: ${colors.text};
          --color-text-muted: ${colors.textMuted};
          --color-accent: ${colors.accent};
          --color-accent-soft: ${colors.accentSoft};
          --color-border: ${colors.border};
        }
      `;

          document.head.appendChild(style);
        } catch (error) {
          console.error(error);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <style>
      :root {
        --color-background: %VITE_BRAND_BACKGROUND_COLOR%;
        --color-surface: #141414;
        --color-surface-muted: #1e1e1e;
        --color-text: %VITE_BRAND_TEXT_COLOR%;
        --color-text-muted: #b8b2a7;
        --color-accent: %VITE_BRAND_PRIMARY_COLOR%;
        --color-accent-soft: %VITE_BRAND_PRIMARY_COLOR%;
        --color-border: rgba(255, 255, 255, 0.12);
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
